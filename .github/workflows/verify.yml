name: Verify

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: controller/package-lock.json
      - run: npm ci
        working-directory: controller
      - run: npm test
        working-directory: controller
      - run: node --check src/index.js && node --check src/agent.js && node --check ../extension/service-worker.js && node --check ../extension/sidepanel.js
        working-directory: controller
      - run: jq empty ../extension/manifest.json package.json
        working-directory: controller
